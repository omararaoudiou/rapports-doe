<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Admin — c-it.fr</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #020817;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #0f2040;
      border: 1px solid #7f1d1d;
      border-radius: 16px;
      padding: 32px 28px;
      max-width: 340px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 800; color: #f1f5f9; margin-bottom: 8px; }
    .subtitle { font-size: 13px; color: #64748b; margin-bottom: 28px; line-height: 1.5; }
    label {
      display: block;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0a1628;
      color: #e2e8f0;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 0.1em;
    }
    input:focus { border-color: #ef4444; }
    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: #ef4444;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #dc2626; }
    button:disabled { background: #334155; cursor: not-allowed; }
    .msg {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      display: none;
    }
    .msg.ok  { background: #052e16; color: #22c55e; display: block; }
    .msg.err { background: #450a0a; color: #ef4444; display: block; }
    .back-link {
      display: block;
      margin-top: 20px;
      color: #475569;
      font-size: 12px;
      text-decoration: none;
    }
    .back-link:hover { color: #93c5fd; }
    .info-box {
      background: #0a1628;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 12px;
      color: #64748b;
      text-align: left;
      line-height: 1.6;
    }
    .info-box strong { color: #93c5fd; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">🔐</div>
  <h1>Réinitialisation Admin</h1>
  <p class="subtitle">Remet le mot de passe admin à <strong style="color:#f59e0b">2222</strong> et libère l'appareil associé au compte 2222.</p>

  <div class="info-box">
    Code de récupération par défaut : <strong>1234</strong>
  </div>

  <label for="code">Code de récupération</label>
  <input type="password" id="code" placeholder="Entrez le code" maxlength="20"
         autocomplete="off" inputmode="numeric" />

  <button onclick="doReset()">🔄 Réinitialiser</button>

  <div class="msg" id="msg"></div>
  <a class="back-link" href="/">← Retour à l'application</a>
</div>

<script>
  // Code de récupération : hash de "1234" (même algo que l'app)
  function checkCode(code) {
    var c = code.trim().toUpperCase();
    // Accept literal "1234"
    if (c === '1234') return true;
    // Hash check (DJB2 variant)
    var h = 0;
    for (var i = 0; i < c.length; i++) {
      h = ((h << 5) - h) + c.charCodeAt(i);
      h = h & h;
    }
    var expected = 0;
    var target = '1234';
    for (var j = 0; j < target.length; j++) {
      expected = ((expected << 5) - expected) + target.charCodeAt(j);
      expected = expected & expected;
    }
    return h === expected;
  }

  // hashPwd — même algo que l'app (DJB2 XOR)
  function hashPwd(pwd) {
    var h = 5381;
    for (var i = 0; i < pwd.length; i++) {
      h = ((h << 5) + h) ^ pwd.charCodeAt(i);
      h = h >>> 0;
    }
    return h.toString(36);
  }

  function show(type, text) {
    var el = document.getElementById('msg');
    el.className = 'msg ' + type;
    el.textContent = text;
  }

  function doReset() {
    var code = document.getElementById('code').value;
    if (!code.trim()) { show('err', '❌ Entrez le code de récupération'); return; }
    if (!checkCode(code)) { show('err', '❌ Code incorrect'); return; }

    try {
      var newHash = hashPwd('2222');

      // 1. Reset localStorage admin password
      localStorage.setItem('__omar_pwd__', newHash);

      // 2. Reset profiles
      var key = '_profiles_';
      var raw = localStorage.getItem(key);
      if (raw) {
        try {
          var profiles = JSON.parse(raw);
          var updated = profiles.map(function(p) {
            // Reset admin password
            if (p.isAdmin) {
              return Object.assign({}, p, { pwdHash: newHash, needSetup: false });
            }
            // Reset device for account "2222"
            if (p.username === '2222' || p.id === '2222') {
              return Object.assign({}, p, {
                deviceId: null, deviceInfo: null,
                deviceId_mobile: null, deviceInfo_mobile: null,
                deviceId_desktop: null, deviceInfo_desktop: null,
              });
            }
            return p;
          });
          localStorage.setItem(key, JSON.stringify(updated));
        } catch(e) {
          // If profiles parsing fails, just clear the admin pwd key
          console.warn('Profiles parse error:', e);
        }
      }

      show('ok', '✅ Réinitialisé ! Identifiant : 2222 / Mot de passe : 2222');
      document.getElementById('code').value = '';
      document.querySelector('button').disabled = true;

      // Redirect after 2.5s
      setTimeout(function() { window.location.href = '/'; }, 2500);

    } catch(err) {
      show('err', '❌ Erreur : ' + err.message);
    }
  }

  // Allow Enter key
  document.getElementById('code').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doReset();
  });
</script>
</body>
</html>
