<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÉNÉRATEUR AUDIT & DOE PRO</title>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; padding: 10px; padding-bottom: 90px; }
        .header { background: #002d5b; color: white; padding: 15px; text-align: center; border-radius: 0 0 15px 15px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-top: 15px; border-left: 5px solid #007bff; }
        h3 { color: #002d5b; font-size: 1rem; margin-top: 0; text-transform: uppercase; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 0.85rem; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-gen { position: fixed; bottom: 15px; left: 15px; right: 15px; background: #28a745; color: white; border: none; padding: 15px; border-radius: 30px; font-weight: bold; cursor: pointer; z-index: 1000; }
        #photoCanvas { width: 100%; display: none; margin-top: 10px; border: 1px solid #002d5b; }
        .table-preview { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.75rem; }
        .table-preview th, .table-preview td { border: 1px solid #ddd; padding: 5px; text-align: left; }
    </style>
</head>
<body>

<div class="header">
    <strong>AUDIT & DOE : MOBILE / STARLINK / PICO</strong>
</div>

<div class="card">
    <h3>📍 Informations Projet</h3>
    <label>N° OT / Commande</label>
    <input type="text" id="ot" placeholder="ex: 12931271">
    <label>CDP Bytel</label>
    <input type="text" id="cdp" placeholder="ex: HUY Jean-Louis">
    <label>Client / Raison Sociale</label>
    <input type="text" id="client" placeholder="ex: CDC Habitat">
    <label>Adresse du site</label>
    <input type="text" id="adresse" placeholder="Adresse complète">
</div>

<div class="card">
    <h3>📡 Type de Solution</h3>
    <select id="type_solution">
        <option value="PICO BTS">PICO BTS</option>
        <option value="STARLINK">STARLINK</option>
        <option value="CRADLEPOINT">CRADLEPOINT 4G/5G</option>
        <option value="ANTENNE MIMO">ANTENNE DÉPORTÉE MIMO</option>
    </select>
</div>

<div class="card">
    <h3>📊 Relevés Radio & Mesures</h3>
    <p style="font-size: 0.8rem; color: #666;">Prenez la photo, puis touchez pour ajouter EnB, RSRP, RSRQ, etc.</p>
    <input type="file" id="camera" accept="image/*" capture="camera">
    <canvas id="photoCanvas"></canvas>
    <table class="table-preview" id="tableMesures">
        <thead>
            <tr><th>N°</th><th>EnB/CellID</th><th>RSRP/RSRQ</th><th>SNR</th></tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div class="card">
    <h3>🛠️ Mise en œuvre & Fournitures</h3>
    <label>Temps estimé (Jours/Heures)</label>
    <input type="text" id="temps" placeholder="ex: 1 jour">
    <label>Nombre d'intervenants</label>
    <input type="number" id="techniciens" value="1">
    <label>Matériel nécessaire</label>
    <textarea id="materiel" rows="3" placeholder="ex: 25m câble RJ45, Injecteur POE, Mât 1.2m..."></textarea>
</div>

<button class="btn-gen" onclick="genererRapport()">📥 GÉNÉRER LE RAPPORT WORD</button>

<script>
    const canvas = document.getElementById('photoCanvas');
    const ctx = canvas.getContext('2d');
    let points = [];
    let img = new Image();

    document.getElementById('camera').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            img.src = ev.target.result;
            img.onload = () => {
                canvas.width = 1000;
                canvas.height = 1000 * (img.height / img.width);
                canvas.style.display = 'block';
                draw();
            };
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function draw() {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        points.forEach((p, i) => {
            ctx.fillStyle = "red";
            ctx.beginPath(); ctx.arc(p.x, p.y, 20, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "white"; ctx.font = "bold 20px Arial";
            ctx.fillText(i+1, p.x-8, p.y+8);
        });
    }

    canvas.onclick = (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        
        const enb = prompt("EnB / CellID :");
        const rsrp = prompt("RSRP / RSRQ (ex: -102/-16) :");
        const snr = prompt("SNR :");
        
        if(enb) {
            points.push({ x, y, enb, rsrp, snr });
            updateTable();
            draw();
        }
    };

    function updateTable() {
        const html = points.map((p, i) => `<tr><td>${i+1}</td><td>${p.enb}</td><td>${p.rsrp}</td><td>${p.snr}</td></tr>`).join('');
        document.querySelector("#tableMesures tbody").innerHTML = html;
    }

    async function genererRapport() {
        const { Document, Packer, Paragraph, Table, TableRow, TableCell, WidthType, ImageRun, HeadingLevel } = docx;
        const imgData = canvas.toDataURL("image/png");

        const rows = [
            new TableRow({ children: [
                new TableCell({ children: [new Paragraph("Point")] }),
                new TableCell({ children: [new Paragraph("EnB / CellID")] }),
                new TableCell({ children: [new Paragraph("RSRP / RSRQ")] }),
                new TableCell({ children: [new Paragraph("SNR")] }),
            ]})
        ];

        points.forEach((p, i) => {
            rows.push(new TableRow({ children: [
                new TableCell({ children: [new Paragraph((i+1).toString())] }),
                new TableCell({ children: [new Paragraph(p.enb)] }),
                new TableCell({ children: [new Paragraph(p.rsrp)] }),
                new TableCell({ children: [new Paragraph(p.snr)] }),
            ]}));
        });

        const doc = new Document({
            sections: [{
                children: [
                    new Paragraph({ text: `RAPPORT D'AUDIT : ${document.getElementById('type_solution').value}`, heading: HeadingLevel.TITLE }),
                    new Paragraph(`OT : ${document.getElementById('ot').value} | Client : ${document.getElementById('client').value}`),
                    new Paragraph(`CDP Bytel : ${document.getElementById('cdp').value}`),
                    new Paragraph(`Adresse : ${document.getElementById('adresse').value}`),
                    
                    new Paragraph({ text: "1. RELEVÉS DE MESURES", heading: HeadingLevel.HEADING_1 }),
                    new Table({ width: { size: 100, type: WidthType.PERCENTAGE }, rows: rows }),

                    new Paragraph({ text: "2. MISE EN ŒUVRE ET MOYENS", heading: HeadingLevel.HEADING_1 }),
                    new Paragraph(`Ressources : ${document.getElementById('techniciens').value} intervenant(s)`),
                    new Paragraph(`Durée estimée : ${document.getElementById('temps').value}`),
                    new Paragraph(`Fournitures nécessaires : ${document.getElementById('materiel').value}`),

                    new Paragraph({ text: "3. REPORTAGE PHOTO", heading: HeadingLevel.HEADING_1 }),
                    new Paragraph({ children: [new ImageRun({ data: imgData.split(',')[1], transformation: { width: 500, height: 400 }, type: "png" })] })
                ]
            }]
        });

        Packer.toBlob(doc).then(blob => saveAs(blob, `AUDIT_${document.getElementById('ot').value}.docx`));
    }
</script>
</body>
</html>
