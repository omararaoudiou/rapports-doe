<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOGETREL / BYTEL - GEN RAPPORT V4</title>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --blue: #002d5b; --green: #28a745; --orange: #ff7900; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; padding-bottom: 120px; color: #333; }
        .header { background: var(--blue); color: white; padding: 15px; text-align: center; border-radius: 0 0 20px 20px; margin-bottom: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; border-left: 5px solid var(--blue); }
        h3 { color: var(--blue); font-size: 1rem; margin: 0 0 10px 0; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        label { display: block; margin: 12px 0 5px; font-weight: bold; font-size: 0.85rem; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .hidden { display: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-gen { position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--green); color: white; border: none; padding: 20px; border-radius: 50px; font-weight: bold; font-size: 1.1rem; box-shadow: 0 10px 20px rgba(40,167,69,0.3); z-index: 1000; cursor: pointer; }
        .radio-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        .radio-table th { background: #eee; padding: 5px; border: 1px solid #ddd; }
        .radio-table td { padding: 3px; border: 1px solid #ddd; }
        .radio-table input { padding: 5px; font-size: 11px; border: none; background: #fffde7; }
        .mat-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .mat-item input[type="number"] { width: 60px; padding: 5px; }
    </style>
</head>
<body>

<div class="header">
    <strong>🔧 SYSTÈME EXPERT : AUDIT & DOE</strong>
</div>

<div class="card">
    <h3>⚙️ Type de Mission</h3>
    <div class="grid">
        <div>
            <label>Solution</label>
            <select id="solution" onchange="updateUI()">
                <option value="STARLINK">STARLINK</option>
                <option value="CRADLEPOINT">CRADLEPOINT</option>
                <option value="PICO">PICO BTS</option>
            </select>
        </div>
        <div>
            <label>Phase</label>
            <select id="phase" onchange="updateUI()">
                <option value="AUDIT">AUDIT (VT)</option>
                <option value="DOE">DOE (Recette)</option>
            </select>
        </div>
    </div>
</div>

<div class="card">
    <h3>📍 Infos Site</h3>
    <input type="text" id="ot" placeholder="N° OT (ex: 12486728)">
    <input type="text" id="client" placeholder="Client / Enseigne (ex: INFO.U)">
    <input type="text" id="cdp" placeholder="CDP Bytel (ex: Afaf MOUDAOUI)">
    <textarea id="adresse" rows="2" placeholder="Adresse du site"></textarea>
</div>

<div id="divStarlink" class="card">
    <h3>🛰️ Détails Starlink</h3>
    <label>N° Kit (DOE uniquement)</label>
    <input type="text" id="kitSn" placeholder="KIT4E000...">
    <label>Cheminement</label>
    <select id="cheminStarlink">
        <option>Gaine client existante</option>
        <option>Pose de gaine diam. 40 (Sogetrel)</option>
        <option>Cheminement faux-plafond</option>
    </select>
</div>

<div id="divCradle" class="card hidden">
    <h3>📶 Mesures Radio & Débits</h3>
    <table class="radio-table">
        <tr><th>Opé</th><th>EnB</th><th>RSRP</th><th>SNR</th><th>DL (Mb)</th></tr>
        <tr>
            <td style="color:var(--blue);font-weight:bold">BYTEL</td>
            <td><input type="text" id="enbB"></td>
            <td><input type="text" id="rsrpB"></td>
            <td><input type="text" id="snrB"></td>
            <td><input type="text" id="dlB"></td>
        </tr>
        <tr>
            <td style="color:var(--orange);font-weight:bold">ORANGE</td>
            <td><input type="text" id="enbO"></td>
            <td><input type="text" id="rsrpO"></td>
            <td><input type="text" id="snrO"></td>
            <td><input type="text" id="dlO"></td>
        </tr>
    </table>
</div>

<div id="divMateriel" class="card hidden">
    <h3>🛠️ Besoins Travaux (Devis)</h3>
    <div id="listeMatos">
        </div>
    <label>Ressources</label>
    <div class="grid">
        <input type="text" id="intervenants" placeholder="Nb techniciens">
        <input type="text" id="duree" placeholder="Durée estimée">
    </div>
</div>

<div class="card">
    <h3>📸 Photos Terrain</h3>
    <input type="file" id="camera" accept="image/*" capture="camera" style="margin-bottom:10px">
    <canvas id="photoCanvas"></canvas>
    <p style="font-size:0.75rem; color:#666; text-align:center">Le canevas permet de marquer l'emplacement des équipements.</p>
</div>

<button class="btn-gen" onclick="genererRapportComplet()">📥 GÉNÉRER LE RAPPORT DOCX</button>

<script>
    const matosParSolution = {
        'STARLINK': ["Kit Starlink HP", "Mât 1.2m", "Dalles lestées (unité)", "Câble Starlink 25m", "Gaine fendue (m)"],
        'CRADLEPOINT': ["Cradlepoint W1850", "Cradlepoint W1855 (Ext)", "Câble Cat6 (m)", "Noyaux RJ45", "Support mural"],
        'PICO': ["Pico BTS", "Injecteur POE", "Bandeau alimentation", "Câble RJ45 Cat6 (m)"]
    };

    function updateUI() {
        const sol = document.getElementById('solution').value;
        const phase = document.getElementById('phase').value;

        // Toggle sections principales
        document.getElementById('divStarlink').classList.toggle('hidden', sol !== 'STARLINK');
        document.getElementById('divCradle').classList.toggle('hidden', sol !== 'CRADLEPOINT');
        document.getElementById('divMateriel').classList.toggle('hidden', phase !== 'AUDIT');

        // Mise à jour de la liste matériel
        const container = document.getElementById('listeMatos');
        container.innerHTML = '';
        matosParSolution[sol].forEach(item => {
            container.innerHTML += `
                <div class="mat-item">
                    <span>${item}</span>
                    <input type="number" placeholder="Qté" data-item="${item}">
                </div>`;
        });
    }

    // Gestion Photo
    const canvas = document.getElementById('photoCanvas');
    const ctx = canvas.getContext('2d');
    let imgSource = new Image();

    document.getElementById('camera').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            imgSource.src = event.target.result;
            imgSource.onload = () => {
                canvas.width = 800;
                canvas.height = 800 * (imgSource.height / imgSource.width);
                canvas.style.display = 'block';
                ctx.drawImage(imgSource, 0, 0, canvas.width, canvas.height);
            };
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    async function genererRapportComplet() {
        // Logique de génération DOCX (structure identique à tes modèles)
        const ot = document.getElementById('ot').value || "SANS_OT";
        alert("Création du rapport " + ot + " en cours selon les standards Bytel...");
        
        // Note : La fonction docx.js ici compilerait les tableaux de mesures, 
        // les mentions VoLTE pour Pico, et les listes de matériel pour les audits.
        // Packer.toBlob(doc).then(blob => saveAs(blob, `RAPPORT_${ot}.docx`));
    }

    // Init au chargement
    updateUI();
</script>
</body>
</html>
