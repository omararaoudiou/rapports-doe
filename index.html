<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOGETREL - GÉNÉRATEUR AUDIT PICO V10</title>
    
    <script src="https://cdn.jsdelivr.net/npm/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root { --blue: #002d5b; --green: #28a745; --light: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 120px; color: #333; }
        .header { background: var(--blue); color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.2em; }
        .container { max-width: 800px; margin: auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid var(--blue); }
        h3 { color: var(--blue); margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 8px; text-transform: uppercase; font-size: 1em; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        canvas { width: 100%; border-radius: 8px; margin-top: 10px; display: none; border: 1px solid #ddd; }
        .btn-add { background: var(--blue); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .btn-gen { position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--green); color: white; border: none; padding: 20px; border-radius: 50px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 5px 20px rgba(0,0,0,0.4); z-index: 1000; }
        .table-radio { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .table-radio th, .table-radio td { border: 1px solid #ccc; padding: 8px; text-align: center; font-size: 13px; }
        .pico-unit { background: #f0f7ff; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 6px solid var(--blue); }
    </style>
</head>
<body>

<div class="header">📋 SOGETREL - AUDIT PICO BTS</div>

<div class="container">
    <div class="card">
        <h3>1. Identification du Site</h3>
        <input type="text" id="ot" placeholder="Numéro d'OT (ex: 63221)">
        <input type="text" id="client" placeholder="Client (ex: BATIGERE / CDC HABITAT)" style="margin-top:10px;">
        <textarea id="adresse" placeholder="Adresse complète du site" style="margin-top:10px;"></textarea>
    </div>

    <div class="card">
        <h3>2. Photo de la Façade / Accès</h3>
        <input type="file" accept="image/*" capture="camera" onchange="loadPhoto(this, 'c_facade', 'VUE FACADE / ACCES')">
        <canvas id="c_facade"></canvas>
    </div>

    <div class="card">
        <h3>3. Plan de masse & Mesures</h3>
        <input type="file" accept="image/*" capture="camera" onchange="loadPhoto(this, 'c_plan', 'PLAN DE MASSE')">
        <canvas id="c_plan"></canvas>
        
        <table class="table-radio">
            <thead>
                <tr><th>Point</th><th>4G (RSRP)</th><th>5G (RSRP)</th><th>DL/UP</th></tr>
            </thead>
            <tbody id="mBody"></tbody>
        </table>
        <button class="btn-add" onclick="addPM()">+ Ajouter un point de mesure</button>
    </div>

    <div class="card">
        <h3>4. Local Technique & Picos</h3>
        <label>Photo de la Baie Informatique</label>
        <input type="file" accept="image/*" capture="camera" onchange="loadPhoto(this, 'c_baie', 'VUE BAIE INFO')">
        <canvas id="c_baie"></canvas>
        
        <div id="pContainer"></div>
        <button class="btn-add" onclick="addPico()">+ Ajouter une Antenne Pico</button>
    </div>

    <div class="card">
        <h3>5. Travaux & Matériel</h3>
        <textarea id="moe" rows="4">Installation conforme. Prévoir plateau d'alimentation et injecteur POE.</textarea>
    </div>
</div>

<button class="btn-gen" onclick="generateWordDoc()">📥 GÉNÉRER LE RAPPORT (.DOCX)</button>

<script>
    const { Document, Packer, Paragraph, TextRun, ImageRun, HeadingLevel, AlignmentType } = window.docx;
    let pmCount = 0; let picoCount = 0;
    const photoStore = {};

    function addPM() {
        pmCount++;
        const row = `<tr><td>PM${pmCount}</td>
            <td><input type="text" id="v4_${pmCount}" value="-105"></td>
            <td><input type="text" id="v5_${pmCount}" value="-112"></td>
            <td><input type="text" id="vS_${pmCount}" value="30/10"></td></tr>`;
        document.getElementById('mBody').insertAdjacentHTML('beforeend', row);
    }

    function addPico() {
        picoCount++;
        const h = `<div class="pico-unit">
            <label>PICO N°${picoCount} - Emplacement</label>
            <input type="file" accept="image/*" capture="camera" onchange="loadPhoto(this, 'c_p${picoCount}', 'PICO ${picoCount}')">
            <canvas id="c_p${picoCount}"></canvas>
            <input type="number" id="d_p${picoCount}" placeholder="Métrage desserte (m)" style="margin-top:10px;">
        </div>`;
        document.getElementById('pContainer').insertAdjacentHTML('beforeend', h);
    }

    function loadPhoto(input, cid, label) {
        if (!input.files[0]) return;
        const canvas = document.getElementById(cid);
        const ctx = canvas.getContext('2d');
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const ratio = img.height / img.width;
                canvas.width = 800; canvas.height = 800 * ratio;
                canvas.style.display = 'block';
                ctx.drawImage(img, 0, 0, 800, 800 * ratio);
                // Badge Sogetrel
                ctx.fillStyle = "rgba(0,45,91,0.85)"; ctx.fillRect(0,0,250,40);
                ctx.fillStyle = "white"; ctx.font = "bold 18px Arial"; ctx.fillText(label, 15, 26);
                photoStore[cid] = canvas.toDataURL("image/jpeg", 0.75);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    async function generateWordDoc() {
        try {
            const children = [
                new Paragraph({ text: "AUDIT TECHNIQUE PICO BTS", heading: HeadingLevel.TITLE, alignment: AlignmentType.CENTER }),
                new Paragraph({ text: "" }),
                new Paragraph({ children: [new TextRun({ text: `CLIENT : ${document.getElementById('client').value}`, bold: true })] }),
                new Paragraph({ text: `Numéro d'OT : ${document.getElementById('ot').value}` }),
                new Paragraph({ text: `Adresse : ${document.getElementById('adresse').value}` }),
                new Paragraph({ text: "" })
            ];

            const pushImg = (title, id) => {
                children.push(new Paragraph({ text: title, heading: HeadingLevel.HEADING_1 }));
                if(photoStore[id]) {
                    const base64 = photoStore[id].split(',')[1];
                    children.push(new Paragraph({
                        children: [new ImageRun({ data: Uint8Array.from(atob(base64), c => c.charCodeAt(0)), width: 500, height: 375 })]
                    }));
                } else { children.push(new Paragraph("Absence de photo.")); }
            };

            pushImg("1. VUE DE LA FACADE", 'c_facade');
            pushImg("2. PLAN DE MASSE", 'c_plan');
            pushImg("3. LOCAL TECHNIQUE", 'c_baie');

            children.push(new Paragraph({ text: "4. DÉTAILS DES ANTENNES PICO", heading: HeadingLevel.HEADING_1 }));
            for(let i=1; i<=picoCount; i++) {
                const d = document.getElementById(`d_p${i}`).value || "0";
                children.push(new Paragraph({ text: `Antenne Pico n°${i} - Desserte estimée : ${d}m`, heading: HeadingLevel.HEADING_2 }));
                if(photoStore[`c_p${i}`]) {
                    const b64 = photoStore[`c_p${i}`].split(',')[1];
                    children.push(new Paragraph({ children: [new ImageRun({ data: Uint8Array.from(atob(b64), c => c.charCodeAt(0)), width: 450, height: 337 })] }));
                }
            }

            children.push(new Paragraph({ text: "5. SYNTHÈSE TRAVAUX", heading: HeadingLevel.HEADING_1 }));
            children.push(new Paragraph(document.getElementById('moe').value));

            const doc = new Document({ sections: [{ children }] });
            const blob = await Packer.toBlob(doc);
            window.saveAs(blob, `Audit_Pico_${document.getElementById('ot').value || "Sogetrel"}.docx`);
        } catch (e) {
            alert("Erreur de génération : " + e.message);
        }
    }

    // Init PM
    for(let i=0; i<3; i++) addPM();
</script>
</body>
</html>
