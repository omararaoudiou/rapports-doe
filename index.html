<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIT Report IA - Version Master</title>
    
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>

    <style>
        :root { --blue: #002d5b; --green: #27ae60; --purple: #6c5ce7; --orange: #f39c12; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; padding: 10px; padding-bottom: 140px; }
        .header { background: var(--blue); color: white; padding: 15px; text-align: center; border-radius: 0 0 20px 20px; margin: -10px -10px 20px -10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border-top: 5px solid var(--blue); }
        h3 { margin-top: 0; color: var(--blue); font-size: 1.1em; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 0.85em; color: #444; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 8px; transition: 0.3s; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* Photo Management */
        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .photo-box { border: 2px dashed #bbb; padding: 10px; text-align: center; border-radius: 8px; font-size: 11px; cursor: pointer; background: #fafafa; min-height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .photo-box img { max-width: 100%; max-height: 80px; margin-top: 5px; border-radius: 4px; }
        
        /* Signal Colors */
        .sig-exc { background-color: #2ecc71 !important; color: white; }
        .sig-good { background-color: #f1c40f !important; }
        .sig-fair { background-color: #e67e22 !important; color: white; }
        .sig-poor { background-color: #e74c3c !important; color: white; }

        .hidden { display: none; }
        .footer-btns { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px; background: white; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 1000; }
        #signature-pad { border: 2px dashed #bbb; height: 120px; background: #fff; width: 100%; border-radius: 8px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">CIT Report IA</h2>
    <p style="margin:5px 0 0; opacity:0.8; font-size: 11px;">Gestion Multi-Rapports : Cradlepoint, Starlink, PICO</p>
</div>

<div class="card" style="border-top-color: var(--purple);">
    <h3>📋 Configuration du Rapport</h3>
    <label>Type de Rapport</label>
    <select id="selectRapport" onchange="majAffichageAuto()">
        <option value="AUDIT_CRADLEPOINT">🔍 Audit Cradlepoint 1850</option>
        <option value="DOE_CRADLEPOINT">🏢 DOE Cradlepoint 1850</option>
        <option value="AUDIT_PICO">🔍 Audit PICO</option>
        <option value="DOE_PICO">🏢 DOE PICO</option>
        <option value="STARLINK">🛰️ Audit/DOE Starlink</option>
    </select>
    
    <label>Numéro d'OT</label>
    <input type="text" id="val_ot" placeholder="Ex: 13063317">
</div>

<div id="section_pico" class="card hidden" style="border-top-color: var(--orange);">
    <h3>📶 Informations PICO</h3>
    <div class="grid">
        <input type="text" id="pico_imei" placeholder="Numéro IMEI">
        <input type="text" id="pico_num" placeholder="Numéro de Pico">
    </div>
    <label>Longueur de câble réseau (m)</label>
    <input type="number" id="pico_cable" placeholder="Ex: 25">
</div>

<div id="section_radio" class="card" style="border-top-color: var(--green);">
    <h3>📡 Mesures Radio & Qualité</h3>
    <div class="grid">
        <div><label>RSRP</label><input type="number" id="v_rsrp" placeholder="-85" oninput="colorer(this, 'rsrp')"></div>
        <div><label>RSRQ</label><input type="number" id="v_rsrq" placeholder="-12" oninput="colorer(this, 'rsrq')"></div>
        <div><label>SNR</label><input type="number" id="v_snr" placeholder="15" oninput="colorer(this, 'snr')"></div>
        <div><label>Ping</label><input type="number" id="v_ping" placeholder="30"></div>
        <div><label>DL (Mbps)</label><input type="number" id="v_dl" placeholder="100"></div>
        <div><label>UL (Mbps)</label><input type="number" id="v_ul" placeholder="40"></div>
    </div>
</div>

<div class="card">
    <h3>🖼️ Reportage Photos</h3>
    <div class="photo-grid">
        <div class="photo-box" onclick="triggerImg('f_baie_p')">Baie (Vue Proche)<input type="file" id="f_baie_p" class="hidden" accept="image/*" onchange="preview(this)"><div class="prev"></div></div>
        <div class="photo-box" onclick="triggerImg('f_baie_l')">Baie (Vue Large)<input type="file" id="f_baie_l" class="hidden" accept="image/*" onchange="preview(this)"><div class="prev"></div></div>
        <div id="box_antenne" class="photo-box" onclick="triggerImg('f_ant')">Emplacement Antenne<input type="file" id="f_ant" class="hidden" accept="image/*" onchange="preview(this)"><div class="prev"></div></div>
        <div class="photo-box" onclick="triggerImg('f_chem')">Cheminement Câble<input type="file" id="f_chem" class="hidden" accept="image/*" onchange="preview(this)"><div class="prev"></div></div>
        <div class="photo-box" style="grid-column: span 2;" onclick="triggerImg('f_plan')">📍 Plan du site (Pastilles)<input type="file" id="f_plan" class="hidden" accept="image/*" onchange="preview(this)"><div class="prev"></div></div>
    </div>
</div>

<div class="card">
    <h3>✍️ Validation</h3>
    <input type="text" id="val_tech" placeholder="Nom du technicien">
    <canvas id="signature-pad"></canvas>
</div>

<div class="footer-btns">
    <button onclick="genererWordMaster()" style="background:var(--blue); color:white; font-weight:bold; border:none; border-radius:8px;">GÉNÉRER RAPPORT</button>
    <button onclick="window.print()" style="background:#ddd; border:none; border-radius:8px;">PDF</button>
</div>

<script>
    // --- LOGIQUE D'AFFICHAGE DYNAMIQUE ---
    function majAffichageAuto() {
        const type = document.getElementById('selectRapport').value;
        
        // Afficher section PICO
        document.getElementById('section_pico').classList.toggle('hidden', !type.includes('PICO'));
        
        // Afficher mesures Radio
        document.getElementById('section_radio').classList.toggle('hidden', type.includes('STARLINK'));
        
        // Masquer/Afficher Antenne selon le type
        document.getElementById('box_antenne').style.display = (type.includes('AUDIT')) ? 'flex' : 'flex';
    }

    // --- COULEURS DE QUALITÉ ---
    function colorer(el, type) {
        const val = parseFloat(el.value);
        el.className = "";
        if (type === 'rsrp') {
            if (val >= -80) el.classList.add('sig-exc');
            else if (val >= -90) el.classList.add('sig-good');
            else if (val >= -105) el.classList.add('sig-fair');
            else el.classList.add('sig-poor');
        } else if (type === 'snr') {
            if (val >= 20) el.classList.add('sig-exc');
            else if (val >= 13) el.classList.add('sig-good');
            else if (val >= 0) el.classList.add('sig-fair');
            else el.classList.add('sig-poor');
        }
    }

    // --- PHOTOS ---
    function triggerImg(id) { document.getElementById(id).click(); }
    function preview(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = (e) => {
                input.parentElement.querySelector('.prev').innerHTML = `<img src="${e.target.result}">`;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // --- GENERATION DOCX ---
    async function genererWordMaster() {
        const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, ImageRun, AlignmentType } = docx;
        const typeDoc = document.getElementById('selectRapport').value;
        const ot = document.getElementById('val_ot').value || "SANS_OT";

        async function getB(id) {
            const f = document.getElementById(id).files[0];
            return f ? await fetch(URL.createObjectURL(f)).then(r => r.blob()) : null;
        }

        const bPlan = await getB('f_plan');
        const content = [
            new Paragraph({ children: [new TextRun({ text: "SOGETREL - " + typeDoc, bold: true, size: 32 })], alignment: AlignmentType.CENTER }),
            new Paragraph({ text: "Numéro d'OT : " + ot, spacing: {before: 200} })
        ];

        // Ajout spécifique PICO dans le Word
        if(typeDoc.includes('PICO')) {
            content.push(new Paragraph({ text: "DONNÉES PICO", heading: docx.HeadingLevel.HEADING_1 }));
            content.push(new Paragraph("IMEI : " + document.getElementById('pico_imei').value));
            content.push(new Paragraph("Numéro Pico : " + document.getElementById('pico_num').value));
            content.push(new Paragraph("Longueur Câble : " + document.getElementById('pico_cable').value + " mètres"));
        }

        // Ajout Plan si existant
        if(bPlan) {
            content.push(new Paragraph({ text: "PLAN D'IMPLANTATION", heading: docx.HeadingLevel.HEADING_1 }));
            content.push(new Paragraph({ children: [new ImageRun({ data: bPlan, transformation: { width: 500, height: 350 } })] }));
        }

        const doc = new Document({ sections: [{ children: content }] });
        Packer.toBlob(doc).then(blob => saveAs(blob, `RAPPORT_${ot}.docx`));
    }

    // --- SIGNATURE ---
    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth; canvas.height = 120;
    let draw = false;
    canvas.onmousedown = canvas.ontouchstart = () => { draw = true; ctx.beginPath(); };
    window.onmouseup = window.ontouchend = () => draw = false;
    canvas.onmousemove = canvas.ontouchmove = (e) => {
        if(!draw) return;
        const r = canvas.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
        ctx.lineTo(x, y); ctx.stroke();
    };

    majAffichageAuto();
</script>
</body>
</html>
