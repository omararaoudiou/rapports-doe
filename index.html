<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOGETREL - GENERATEUR AUDIT PICO</title>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --blue: #002d5b; --green: #28a745; --light: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 100px; }
        .header { background: var(--blue); color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; }
        .container { max-width: 850px; margin: auto; padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h3 { color: var(--blue); border-bottom: 2px solid var(--blue); padding-bottom: 5px; margin-top: 5px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-add { background: var(--blue); color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; margin: 10px 0; }
        .btn-gen { position: fixed; bottom: 15px; left: 15px; right: 15px; background: var(--green); color: white; border: none; padding: 15px; border-radius: 50px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        canvas { width: 100%; border: 1px solid #ddd; margin-top: 10px; display: none; }
        .table-radio { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        .table-radio th { background: #eee; padding: 5px; border: 1px solid #ccc; }
        .table-radio td { border: 1px solid #ccc; padding: 0; }
        .table-radio input { border: none; text-align: center; border-radius: 0; padding: 5px; }
    </style>
</head>
<body>

<div class="header">📋 AUDIT PICO BTS - SOGETREL</div>

<div class="container">
    <div class="card">
        <h3>1. Informations Site</h3>
        <div class="grid">
            <input type="text" id="ot" placeholder="N° OT (ex: 62721)">
            <input type="text" id="cdp" placeholder="CDP Bytel">
        </div>
        <input type="text" id="client" placeholder="Raison Sociale (ex: CDC HABITAT)" style="margin-top:10px;">
        <textarea id="adresse" placeholder="Adresse complète du site" style="margin-top:10px;"></textarea>
    </div>

    <div class="card">
        <h3>2. Plan de Masse & Points de Mesures</h3>
        <label>Photo du plan annoté (PM1, PM2...)</label>
        <input type="file" accept="image/*" capture="camera" onchange="preview(this, 'c_plan', 'PLAN DE MASSE')">
        <canvas id="c_plan"></canvas>
    </div>

    <div class="card">
        <h3>3. État de la couverture Radio</h3>
        <p style="font-size: 0.8em; color: #666;">Note : Référez-vous à Network Cell Info Lite</p>
        <table class="table-radio" id="tableMesures">
            <thead>
                <tr>
                    <th>Point</th>
                    <th>4G (RSRP/RSRQ)</th>
                    <th>5G (RSRP/RSRQ)</th>
                    <th>Speedtest (DL/UP)</th>
                </tr>
            </thead>
            <tbody id="bodyMesures">
                </tbody>
        </table>
        <button class="btn-add" onclick="addRow()">+ Ajouter un Point de Mesure (PM)</button>
    </div>

    <div class="card">
        <h3>4. Mise en place Solution PICO</h3>
        <label>Photo de la Baie Informatique</label>
        <input type="file" accept="image/*" capture="camera" onchange="preview(this, 'c_baie', 'BAIE INFORMATIQUE')">
        <canvas id="c_baie"></canvas>
        
        <div id="picoContainer"></div>
        <button class="btn-add" onclick="addPico()">+ Ajouter une Antenne PICO</button>
    </div>

    <div class="card">
        <h3>5. Mise en œuvre & Accès</h3>
        <label>Moyens nécessaires (Fournitures / Outils)</label>
        <textarea id="moe" rows="4">Installation de X BTS.
Injecteur POE, Bandeau d'alimentation.
Perforateur, Vis/Chevilles.</textarea>
        
        <label>Accès Site / Hauteur</label>
        <select id="acces">
            <option>Escabeau / PIRL (Accès standard)</option>
            <option>Nacelle nécessaire</option>
            <option>Échelle nécessaire</option>
        </select>
    </div>
</div>

<button class="btn-gen" onclick="generatePicoDoc()">📥 GÉNÉRER L'AUDIT PICO (DOCX)</button>

<script>
    let pmCount = 0;
    let picoCount = 0;

    function addRow() {
        pmCount++;
        const row = `<tr>
            <td style="text-align:center; font-weight:bold;">PM0${pmCount}</td>
            <td><input type="text" placeholder="-105/ -15"></td>
            <td><input type="text" placeholder="-110/ -16"></td>
            <td><input type="text" placeholder="15 / 5"></td>
        </tr>`;
        document.getElementById('bodyMesures').insertAdjacentHTML('beforeend', row);
    }

    function addPico() {
        picoCount++;
        const html = `
            <div style="background:#f0f7ff; padding:10px; border-radius:5px; margin-top:10px; border-left:4px solid var(--blue);">
                <label>PICO N°${picoCount} - Photo emplacement</label>
                <input type="file" accept="image/*" capture="camera" onchange="preview(this, 'c_pico_${picoCount}', 'EMPLACEMENT PICO ${picoCount}')">
                <canvas id="c_pico_${picoCount}"></canvas>
                <label>Métrage Desserte (m)</label>
                <input type="number" placeholder="Distance vers la baie">
            </div>`;
        document.getElementById('picoContainer').insertAdjacentHTML('beforeend', html);
    }

    function preview(input, canvasId, label) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                canvas.width = 800; canvas.height = 600;
                canvas.style.display = 'block';
                ctx.drawImage(img, 0, 0, 800, 600);
                ctx.fillStyle = "rgba(0,45,91,0.8)";
                ctx.fillRect(0,0,280,40);
                ctx.fillStyle = "white";
                ctx.font = "bold 18px Arial";
                ctx.fillText(label, 15, 25);
            }
            img.src = e.target.result;
        }
        reader.readAsDataURL(input.files[0]);
    }

    function generatePicoDoc() {
        alert("Génération du rapport d'audit PICO conforme au modèle Sogetrel...");
        // Ici la logique docx.js pour compiler les sections
    }

    // Initialisation
    addRow(); addRow(); addRow(); // 3 PM par défaut
</script>

</body>
</html>
