<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOGETREL - AUDIT PICO PDF PRO</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --blue: #002d5b; --green: #27ae60; --red: #e74c3c; --light: #f8f9fa; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--light); margin: 0; padding-bottom: 120px; color: #2c3e50; }
        
        /* Interface Mobile */
        .header { background: var(--blue); color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.2em; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 800px; margin: auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; border-top: 5px solid var(--blue); }
        h3 { color: var(--blue); margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; text-transform: uppercase; font-size: 0.95em; letter-spacing: 1px; }
        
        label { display: block; margin: 15px 0 5px; font-weight: bold; font-size: 0.9em; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 16px; background: #fff; }
        
        /* Photos */
        canvas { width: 100%; border-radius: 8px; margin-top: 10px; display: none; border: 1px solid #ddd; background: #000; }
        .btn-add { background: var(--blue); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; font-size: 0.9em; }
        
        /* Tableau */
        .table-radio { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        .table-radio th, .table-radio td { border: 1px solid #dee2e6; padding: 10px; text-align: center; font-size: 13px; }
        .table-radio th { background: #f1f3f5; color: var(--blue); }
        .table-radio input { border: none; padding: 5px; text-align: center; width: 100%; }

        /* Bouton Flottant Générer */
        .btn-gen { position: fixed; bottom: 25px; left: 20px; right: 20px; background: var(--red); color: white; border: none; padding: 20px; border-radius: 50px; font-weight: bold; font-size: 1.1em; cursor: pointer; box-shadow: 0 8px 25px rgba(231, 76, 60, 0.4); z-index: 1000; transition: 0.3s; }
        .btn-gen:active { transform: scale(0.95); }

        .pico-unit { background: #f1f8ff; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 6px solid var(--blue); }

        /* Styles Spécifiques pour le rendu PDF (Invisibles sur l'écran) */
        #pdf-template { display: none; padding: 30px; background: white; }
        .pdf-header { text-align: center; border-bottom: 3px solid var(--blue); margin-bottom: 30px; padding-bottom: 10px; }
        .pdf-section { margin-bottom: 40px; page-break-inside: avoid; }
        .pdf-title { background: var(--blue); color: white; padding: 8px 15px; font-size: 1.2em; border-radius: 4px; margin-bottom: 15px; }
        .pdf-img { width: 100%; border-radius: 5px; margin-top: 10px; display: block; }
        .pdf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px; }
        .pdf-info-box { border: 1px solid #ddd; padding: 15px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="header">SOGETREL - AUDIT PICO BTS</div>

<div class="container" id="main-ui">
    
    <div class="card">
        <h3>1. Informations Site</h3>
        <label>Numéro d'OT</label>
        <input type="text" id="ot" placeholder="Ex: 62554">
        <label>Client / Raison Sociale</label>
        <input type="text" id="client" placeholder="Ex: CDC HABITAT">
        <label>Adresse Complète</label>
        <textarea id="adresse" rows="2" placeholder="N°, rue, CP, Ville"></textarea>
    </div>

    <div class="card">
        <h3>2. Vue Extérieure / Façade</h3>
        <label>Photo pour l'accès (stationnement nacelle / entrée)</label>
        <input type="file" accept="image/*" capture="camera" onchange="loadPhoto(this, 'c_facade', 'VUE FACADE / ACCES SITE')">
        <canvas id="c_facade"></canvas>
    </div>

    <div class="card">
        <h3>3. Couverture Radio & Plan</h3>
        <label>Plan de masse annoté</label>
        <input type="file" accept="image/*" capture="camera" onchange="loadPhoto(this, 'c_plan', 'PLAN DE MASSE')">
        <canvas id="c_plan"></canvas>
        
        <table class="table-radio">
            <thead>
                <tr><th>Point</th><th>4G (RSRP)</th><th>5G (RSRP)</th><th>DL/UP</th></tr>
            </thead>
            <tbody id="mBody"></tbody>
        </table>
        <button class="btn-add" onclick="addPM()">+ Ajouter un Point de Mesure</button>
    </div>

    <div class="card">
        <h3>4. Local Technique (Source)</h3>
        <label>Photo de la Baie Informatique</label>
        <input type="file" accept="image/*" capture="camera" onchange="loadPhoto(this, 'c_baie', 'VUE BAIE INFO')">
        <canvas id="c_baie"></canvas>
    </div>

    <div class="card">
        <h3>5. Emplacements Picos</h3>
        <div id="pContainer"></div>
        <button class="btn-add" onclick="addPico()">+ Ajouter une Antenne Pico</button>
    </div>

</div>

<button class="btn-gen" onclick="generatePDF()">📄 GÉNÉRER LE RAPPORT PDF FINAL</button>

<div id="pdf-template">
    <div class="pdf-header">
        <h1 style="margin:0; color:var(--blue);">AUDIT TECHNIQUE PICO BTS</h1>
        <p style="margin:5px 0; color:#666;">Document Technique Sogetrel - Intervention Mobile</p>
    </div>

    <div id="pdf-content">
        </div>
</div>

<script>
    let pmCount = 0; let picoCount = 0;
    const photoStore = {};

    // Initialisation Mesures
    function addPM() {
        pmCount++;
        const row = `<tr>
            <td style="font-weight:bold;">PM${pmCount}</td>
            <td><input type="text" id="r4_${pmCount}" value="-105"></td>
            <td><input type="text" id="r5_${pmCount}" value="-112"></td>
            <td><input type="text" id="rs_${pmCount}" value="40/15"></td>
        </tr>`;
        document.getElementById('mBody').insertAdjacentHTML('beforeend', row);
    }

    // Ajout Antenne
    function addPico() {
        picoCount++;
        const html = `<div class="pico-unit">
            <label style="color:var(--blue)">ANTENNE PICO N°${picoCount}</label>
            <input type="file" accept="image/*" capture="camera" onchange="loadPhoto(this, 'c_p${picoCount}', 'PICO ${picoCount}')">
            <canvas id="c_p${picoCount}"></canvas>
            <label>Distance Desserte (m)</label>
            <input type="number" id="d_p${picoCount}" placeholder="Métrage câble">
        </div>`;
        document.getElementById('pContainer').insertAdjacentHTML('beforeend', html);
    }

    // Traitement Photo
    function loadPhoto(input, cid, label) {
        if (!input.files[0]) return;
        const canvas = document.getElementById(cid);
        const ctx = canvas.getContext('2d');
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const ratio = img.height / img.width;
                canvas.width = 1000; canvas.height = 1000 * ratio;
                canvas.style.display = 'block';
                ctx.drawImage(img, 0, 0, 1000, 1000 * ratio);
                
                // Bandeau Bleu Sogetrel
                ctx.fillStyle = "rgba(0,45,91,0.9)";
                ctx.fillRect(0, 0, 350, 60);
                ctx.fillStyle = "white";
                ctx.font = "bold 24px Arial";
                ctx.fillText(label, 20, 40);
                
                // Stockage haute qualité
                photoStore[cid] = canvas.toDataURL("image/jpeg", 0.8);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    // GÉNÉRATION PDF
    async function generatePDF() {
        const ot = document.getElementById('ot').value || "SANS_OT";
        const pdfContent = document.getElementById('pdf-content');
        
        // Construction du HTML interne du PDF
        let html = `
            <div class="pdf-section">
                <div class="pdf-grid">
                    <div class="pdf-info-box">
                        <strong>N° d'OT :</strong> ${ot}<br>
                        <strong>Date :</strong> ${new Date().toLocaleDateString('fr-FR')}
                    </div>
                    <div class="pdf-info-box">
                        <strong>Client :</strong> ${document.getElementById('client').value}<br>
                        <strong>Adresse :</strong> ${document.getElementById('adresse').value}
                    </div>
                </div>
            </div>

            <div class="pdf-section">
                <div class="pdf-title">1. PHOTO DE LA FAÇADE / ACCÈS</div>
                ${photoStore['c_facade'] ? `<img src="${photoStore['c_facade']}" class="pdf-img">` : '<p style="color:red">Photo manquante</p>'}
            </div>

            <div class="pdf-section">
                <div class="pdf-title">2. PLAN DE MASSE ET POINTS DE MESURES</div>
                ${photoStore['c_plan'] ? `<img src="${photoStore['c_plan']}" class="pdf-img">` : '<p style="color:red">Photo manquante</p>'}
            </div>

            <div class="pdf-section">
                <div class="pdf-title">3. ÉTAT DE LA COUVERTURE RADIO (NETWORK CELL INFO)</div>
                <table style="width:100%; border-collapse:collapse; margin-top:10px;">
                    <tr style="background:#002d5b; color:white;">
                        <th style="padding:10px; border:1px solid #ddd;">Point</th>
                        <th style="padding:10px; border:1px solid #ddd;">4G (RSRP)</th>
                        <th style="padding:10px; border:1px solid #ddd;">5G (RSRP)</th>
                        <th style="padding:10px; border:1px solid #ddd;">Débits DL/UP</th>
                    </tr>`;
        
        for(let i=1; i<=pmCount; i++) {
            html += `<tr>
                <td style="padding:8px; border:1px solid #ddd; text-align:center;">PM${i}</td>
                <td style="padding:8px; border:1px solid #ddd; text-align:center;">${document.getElementById('r4_'+i).value} dBm</td>
                <td style="padding:8px; border:1px solid #ddd; text-align:center;">${document.getElementById('r5_'+i).value} dBm</td>
                <td style="padding:8px; border:1px solid #ddd; text-align:center;">${document.getElementById('rs_'+i).value} Mbps</td>
            </tr>`;
        }
        html += `</table></div>`;

        html += `
            <div class="pdf-section">
                <div class="pdf-title">4. LOCAL TECHNIQUE (BAIE / SOURCE)</div>
                ${photoStore['c_baie'] ? `<img src="${photoStore['c_baie']}" class="pdf-img">` : '<p style="color:red">Photo manquante</p>'}
            </div>

            <div class="pdf-section" style="page-break-before: always;">
                <div class="pdf-title">5. DÉTAILS DES ANTENNES PICO BTS</div>`;
        
        for(let j=1; j<=picoCount; j++) {
            const m = document.getElementById('d_p'+j).value || "0";
            html += `
                <div style="margin-bottom:30px; border-bottom:1px solid #eee; padding-bottom:15px;">
                    <p><strong>Antenne n°${j}</strong> — Distance de desserte prévue : <strong>${m} mètres</strong></p>
                    ${photoStore['c_p'+j] ? `<img src="${photoStore['c_p'+j]}" class="pdf-img">` : '<p style="color:red">Photo manquante</p>'}
                </div>`;
        }
        html += `</div>`;

        // Injection et conversion
        pdfContent.innerHTML = html;
        const template = document.getElementById('pdf-template');
        template.style.display = 'block';

        const options = {
            margin: 10,
            filename: `Audit_Pico_${ot}_${document.getElementById('client').value}.pdf`,
            image: { type: 'jpeg', quality: 0.95 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().from(template).set(options).save().then(() => {
            template.style.display = 'none';
        });
    }

    // Init par défaut
    for(let i=0; i<3; i++) addPM();
</script>

</body>
</html>
