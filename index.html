<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOGETREL FIELD MASTER V38</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.2/docxtemplater.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        :root { --blue: #002d5b; --orange: #f39c12; --green: #27ae60; --red: #e74c3c; --light: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 10px 10px 160px 10px; }
        .header { background: var(--blue); color: white; padding: 15px; text-align: center; border-radius: 0 0 20px 20px; margin: -10px -10px 20px -10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border-top: 5px solid var(--blue); position: relative; }
        h3 { margin: 0 0 10px 0; color: var(--blue); font-size: 0.85em; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; margin-bottom: 8px; font-size: 14px; }
        .btn-ocr { background: var(--orange); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-bottom: 15px; cursor: pointer; display: block; text-align: center; }
        .btn-add { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; cursor: pointer; font-weight: bold; }
        
        .photo-item { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 10px; margin-bottom: 15px; position: relative; }
        .canvas-container { position: relative; width: 100%; background: #222; border-radius: 8px; overflow: hidden; margin-top: 10px; }
        canvas { width: 100%; height: auto; display: block; }
        
        .btn-del { position: absolute; top: 5px; right: 5px; background: var(--red); color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; font-size: 12px; z-index: 10; }
        .btn-undo { background: #666; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 11px; margin-top: 5px; cursor: pointer; }
        
        #loader { display: none; color: var(--orange); font-weight: bold; text-align: center; margin-bottom: 10px; padding: 10px; background: #fff3e0; border-radius: 8px; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px; background: white; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 1000; }
        .btn-gen { background: var(--green); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; width: 100%; font-size: 16px; }
    </style>
</head>
<body>

<div class="header">
    <h2>SOGETREL FIELD MASTER V38</h2>
    <p>OCR Avancé & Identification Prioritaire</p>
</div>

<div class="card" style="border-top-color: var(--orange);">
    <h3>📍 1. Identification du Site</h3>
    <div id="loader">Analyse de la photo en cours... ⏳</div>
    <label class="btn-ocr">
        🖼️ Remplir via Photo / Screenshot
        <input type="file" accept="image/*" onchange="processOCR(this)" style="display:none">
    </label>
    <input type="text" id="ot" placeholder="Numéro d'OT (ex: OT123456)">
    <input type="text" id="client" placeholder="Nom du Client / Enseigne">
    <input type="text" id="adresse" placeholder="Adresse complète du site">
    <input type="text" id="tech" value="Emmanuel MAUDET">
</div>

<div class="card">
    <h3>📂 2. Type de Rapport</h3>
    <select id="active_tpl" onchange="uiRefresh()">
        <optgroup label="AUDITS (Avant-Vente)">
            <option value="AUDIT_PICO">Audit PICO</option>
            <option value="AUDIT_CRADLEPOINT">Audit Cradlepoint</option>
            <option value="AUDIT_STARLINK">Audit Starlink</option>
            <option value="AUDIT_ANTENNE">Audit Antenne</option>
        </optgroup>
        <optgroup label="DOE (Après-Travaux)">
            <option value="DOE_PICO">DOE PICO</option>
            <option value="DOE_CRADLEPOINT">DOE Cradlepoint</option>
            <option value="DOE_STARLINK">DOE Starlink</option>
            <option value="DOE_ANTENNE">DOE Antenne</option>
        </optgroup>
    </select>
</div>

<div class="card">
    <h3>👥 3. Préambules & Contacts</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
        <input type="text" id="cp_nom" placeholder="CP Sogetrel">
        <input type="text" id="contact_nom" placeholder="Contact Site">
    </div>
    <input type="text" id="contact_tel" placeholder="Tél. Contact Site">
    <select id="work_type">
        <option value="SOGETREL">Travaux 100% SOGETREL</option>
        <option value="CLIENT">PRÉREQUIS CLIENT (Bloquant)</option>
    </select>
    <textarea id="travaux_desc" placeholder="Observations ou détails des travaux..." rows="2"></textarea>
</div>

<div class="card" style="border-top-color: var(--green);">
    <h3>🗺️ 4. Plan du Site & Mesures</h3>
    <button class="btn-add" onclick="addItem('PLAN')">➕ Ajouter Plan d'implantation</button>
    <div id="plan_container"></div>
</div>

<div class="card">
    <h3 id="photo_title">🖼️ 5. Photos des Éléments</h3>
    <div id="controls_dyn"></div>
    <div id="photo_container"></div>
</div>

<div class="card">
    <h3>📉 Récapitulatif des Mesures</h3>
    <div id="mesures_list"></div>
</div>

<div class="footer">
    <button class="btn-gen" onclick="generateReport()">🚀 GÉNÉRER LE RAPPORT FINAL (.DOCX)</button>
</div>

<script>
    const TEMPLATES = { AUDIT_PICO: "BASE64...", DOE_PICO: "BASE64..." }; // A remplir
    let items = [];

    // --- LOGIQUE OCR AMÉLIORÉE ---
    async function processOCR(input) {
        if (!input.files[0]) return;
        const loader = document.getElementById('loader');
        loader.style.display = "block";

        try {
            const worker = await Tesseract.createWorker('fra');
            const { data: { text } } = await worker.recognize(input.files[0]);
            
            // Extraction Intelligente
            // Cherche OT suivi de chiffres
            const otMatch = text.match(/OT\s*[:\s]*(\d+)/i);
            if(otMatch) document.getElementById('ot').value = otMatch[1];

            // Cherche le nom du client (souvent après "Client" ou "Site")
            const clientMatch = text.match(/(?:Client|Site|Nom)\s*[:\s]*([^\n\r]+)/i);
            if(clientMatch) document.getElementById('client').value = clientMatch[1].trim();

            // Cherche l'adresse (détection basique code postal + ville)
            const addrMatch = text.match(/\d{5}\s+[A-Z\s]+/);
            if(addrMatch) document.getElementById('adresse').value = addrMatch[0];

            await worker.terminate();
            alert("Informations extraites avec succès !");
        } catch (e) {
            alert("Erreur lors de la lecture de l'image.");
        }
        loader.style.display = "none";
    }

    function uiRefresh() {
        const type = document.getElementById('active_tpl').value;
        const ctrls = document.getElementById('controls_dyn');
        ctrls.innerHTML = type.includes('PICO') ? 
            `<button class="btn-add" onclick="addItem('PICO')">➕ Ajouter Photo Pico (IMEI/SN)</button>` : 
            `<button class="btn-add" onclick="addItem('GEN')">➕ Ajouter une Photo Équipement</button>`;
        render();
    }

    function addItem(type) {
        items.push({ id: Date.now(), type, img: null, markers: [], imei: '', sn: '', label: '' });
        render();
    }

    function deleteItem(id) {
        items = items.filter(x => x.id !== id);
        render();
    }

    function undoMarker(id) {
        const item = items.find(x => x.id === id);
        if (item && item.markers.length > 0) {
            item.markers.pop();
            draw(item);
            renderMesures();
        }
    }

    function render() {
        document.getElementById('plan_container').innerHTML = "";
        document.getElementById('photo_container').innerHTML = "";
        
        items.forEach(el => {
            const div = document.createElement('div');
            div.className = "photo-item";
            let fields = el.type === 'PICO' ? 
                `<div style="display:flex;gap:5px;margin-bottom:8px;"><input type="text" placeholder="IMEI" onchange="upd(${el.id},'imei',this.value)"><input type="text" placeholder="SN" onchange="upd(${el.id},'sn',this.value)"></div>` : 
                `<input type="text" placeholder="Légende" onchange="upd(${el.id},'label',this.value)">`;
            
            div.innerHTML = `
                <button class="btn-del" onclick="deleteItem(${el.id})">✕</button>
                ${fields}
                <input type="file" accept="image/*" onchange="loadImg(${el.id},this)">
                <div class="canvas-container"><canvas id="cvs_${el.id}" onclick="mark(${el.id},event)"></canvas></div>
                <button class="btn-undo" onclick="undoMarker(${el.id})">↺ Annuler point</button>
            `;
            document.getElementById(el.type === 'PLAN' ? 'plan_container' : 'photo_container').appendChild(div);
            if(el.img) draw(el);
        });
        renderMesures();
    }

    function loadImg(id, input) {
        if (input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const el = items.find(x => x.id === id);
                    el.img = img;
                    const c = document.getElementById(`cvs_${id}`);
                    c.width = img.width; c.height = img.height;
                    draw(el);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function mark(id, e) {
        const el = items.find(x => x.id === id); if(!el.img) return;
        const c = document.getElementById(`cvs_${id}`);
        const r = c.getBoundingClientRect();
        el.markers.push({ 
            x: (e.clientX - r.left) * (c.width / r.width), 
            y: (e.clientY - r.top) * (c.height / r.height) 
        });
        draw(el); renderMesures();
    }

    function draw(el) {
        const ctx = document.getElementById(`cvs_${el.id}`).getContext('2d');
        ctx.drawImage(el.img, 0, 0);
        let globalIdx = 1;
        // Pour recalculer le bon index global de M1, M2...
        let currentIdx = 1;
        for(let item of items) {
            if(item.id === el.id) {
                el.markers.forEach((m) => {
                    const rad = ctx.canvas.width * 0.025;
                    ctx.beginPath(); ctx.arc(m.x, m.y, rad, 0, Math.PI*2); ctx.fillStyle = "#27ae60"; ctx.fill();
                    ctx.fillStyle = "white"; ctx.font = `bold ${rad}px Arial`; ctx.textAlign="center";
                    ctx.fillText("M"+(globalIdx), m.x, m.y + (rad/3));
                    globalIdx++;
                });
                break;
            }
            globalIdx += item.markers.length;
        }
    }

    function renderMesures() {
        const cont = document.getElementById('mesures_list');
        cont.innerHTML = "";
        let total = items.reduce((a, b) => a + b.markers.length, 0);
        for(let i=1; i<=total; i++) {
            cont.innerHTML += `<div class="pm-block"><b>POINT M${i}</b><div style="display:flex;gap:5px;margin-top:5px;"><input type="number" id="rsrp_${i}" placeholder="RSRP"><input type="number" id="dl_${i}" placeholder="DL"></div></div>`;
        }
    }

    function upd(id, k, v) { items.find(x => x.id === id)[k] = v; }

    function b64ToBuf(b64) {
        const s = window.atob(b64); const b = new Uint8Array(s.length);
        for(let i=0; i<s.length; i++) b[i] = s.charCodeAt(i);
        return b;
    }

    async function generateReport() {
        const tpl = TEMPLATES[document.getElementById('active_tpl').value];
        const zip = new PizZip(b64ToBuf(tpl));
        const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });
        
        const data = {
            ot: document.getElementById('ot').value, client: document.getElementById('client').value, 
            adresse: document.getElementById('adresse').value, tech: document.getElementById('tech').value,
            mesures: []
        };
        // Logique de remplissage mesures...
        doc.render(data);
        saveAs(doc.getZip().generate({type:"blob"}), `SOGETREL_${data.ot}.docx`);
    }

    uiRefresh();
</script>
</body>
</html>
