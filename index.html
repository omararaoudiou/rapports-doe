<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIT Report IA</title>
    
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>

    <style>
        :root { --blue: #002d5b; --green: #27ae60; --purple: #6c5ce7; --orange: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; padding: 10px; padding-bottom: 140px; }
        .header { background: var(--blue); color: white; padding: 15px; text-align: center; border-radius: 0 0 20px 20px; margin: -10px -10px 20px -10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border-top: 5px solid var(--blue); }
        h3 { margin-top: 0; color: var(--blue); font-size: 1.1em; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 0.85em; color: #444; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 8px; }
        .btn-ocr { background: var(--purple); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .status-msg { font-size: 12px; text-align: center; font-weight: bold; margin-top: -10px; margin-bottom: 10px; }
        .footer-btns { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px; background: white; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 1000; }
        #signature-pad { border: 2px dashed #bbb; height: 130px; background: #fff; width: 100%; border-radius: 8px; touch-action: none; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">CIT Report IA</h2>
    <p style="margin:5px 0 0; opacity:0.8; font-size: 11px;">Expertise INFO U & Cradlepoint</p>
</div>

<div class="card" style="border-top-color: var(--purple);">
    <h3>📸 Scan OT / Capture d'écran</h3>
    <input type="file" id="input_ocr" accept="image/*" style="display:none" onchange="traiterOCR(event)">
    <button class="btn-ocr" onclick="document.getElementById('input_ocr').click()">⚡ ANALYSER L'OT AUTOMATIQUEMENT</button>
    <div id="ocr-status" class="status-msg">Prêt pour import</div>
</div>

<div class="card">
    <h3>📍 Informations Dossier (Tableau de garde)</h3>
    
    <label>Modèle de Travaux</label>
    <select id="type_projet" onchange="majLogiqueProjet(); sauvegarderAuto();">
        <option value="SOGETREL_100">UTILE / SCHIEVER (100% Sogetrel)</option>
        <option value="AERIEN_PARTAGE">PROJET AÉRIEN (Partagé Magasin U)</option>
    </select>

    <label>N° OT (Dossier)</label>
    <input type="text" id="val_ot" placeholder="ex: 13063317" oninput="sauvegarderAuto()">

    <label>Chef de Projet (CP) en charge</label>
    <select id="liste_cp" onchange="sauvegarderAuto()"></select>
    <div class="grid" style="margin-top:5px;">
        <input type="text" id="nouveau_cp" placeholder="Ajouter un CP..." style="margin-bottom:0">
        <button onclick="ajouterCP()" style="background:var(--green); color:white; border:none; border-radius:8px;">＋</button>
    </div>

    <label>Client / Enseigne</label>
    <input type="text" id="val_client" placeholder="ex: Magasin U" oninput="sauvegarderAuto()">

    <label>Adresse du site</label>
    <input type="text" id="val_adresse" placeholder="Adresse complète" oninput="sauvegarderAuto()">
</div>

<div class="card" style="border-top-color: var(--orange);">
    <h3>📡 Mesures Signal Cradlepoint</h3>
    <div class="grid">
        <div>
            <label>RSRP (dBm)</label>
            <input type="number" id="val_rsrp" placeholder="-85" oninput="analyserSignal(); sauvegarderAuto();">
        </div>
        <div>
            <label>SINR (dB)</label>
            <input type="number" id="val_sinr" placeholder="15" oninput="sauvegarderAuto();">
        </div>
    </div>
    <div id="signal_feedback" style="font-size:12px; padding:8px; border-radius:5px; margin-top:5px; background:#f0f0f0;">
        Logique auto basée sur le RSRP.
    </div>

    <div id="section_magasin_u" style="display:none; margin-top:15px; border-top:1px solid #eee; padding-top:10px;">
        <p style="font-size:12px; color:var(--orange); font-weight:bold;">📋 Prérequis Magasin U :</p>
        <label><input type="checkbox" id="pre_gaine" checked> Pose gaine de 40mm</label>
        <label><input type="checkbox" id="pre_percement"> Percement dalle toiture</label>
        <label><input type="checkbox" id="pre_nacelle"> Mise à disposition nacelle</label>
    </div>
</div>

<div class="card">
    <h3>✍️ Signature & Technicien</h3>
    <input type="text" id="val_tech" placeholder="Nom du technicien" oninput="sauvegarderAuto()">
    <canvas id="signature-pad"></canvas>
    <button onclick="clearSig()" style="width:100%; border:none; background:none; color:#666; font-size:12px; margin-top:5px;">Effacer la signature</button>
</div>

<div class="footer-btns">
    <button onclick="genererWordFinal()" style="background:var(--blue); color:white; border:none; border-radius:8px; font-weight:bold;">GÉNÉRER WORD</button>
    <button onclick="window.print()" style="background:#ddd; border:none; border-radius:8px;">PDF / APERÇU</button>
</div>

<script>
    // --- GESTION CP ---
    let chefsDeProjet = JSON.parse(localStorage.getItem('cp_cit_ia')) || ["Emmanuel MAUDET", "Omar ARAOUDIOU"];
    function rafraichirCP() {
        const s = document.getElementById('liste_cp'); s.innerHTML = "";
        chefsDeProjet.forEach(n => { let o = document.createElement('option'); o.value=n; o.text=n; s.add(o); });
    }
    function ajouterCP() {
        let n = document.getElementById('nouveau_cp').value.trim();
        if(n) { chefsDeProjet.push(n); document.getElementById('nouveau_cp').value=""; rafraichirCP(); }
    }

    // --- LOGIQUE SIGNAL ---
    function analyserSignal() {
        const rsrp = parseInt(document.getElementById('val_rsrp').value);
        const fb = document.getElementById('signal_feedback');
        if (rsrp >= -90) {
            fb.innerHTML = "🟢 SIGNAL BON : La partie 'Antenne Externe' sera retirée.";
            fb.style.color = "green";
        } else {
            fb.innerHTML = "🔴 SIGNAL FAIBLE : Antenne Déportée nécessaire.";
            fb.style.color = "red";
        }
    }

    function majLogiqueProjet() {
        const type = document.getElementById('type_projet').value;
        document.getElementById('section_magasin_u').style.display = (type === "AERIEN_PARTAGE") ? "block" : "none";
    }

    // --- OCR ---
    async function traiterOCR(event) {
        const file = event.target.files[0];
        document.getElementById('ocr-status').innerText = "⏳ Lecture...";
        try {
            const { data: { text } } = await Tesseract.recognize(file, 'fra');
            const ot = text.match(/\b\d{8}\b/);
            if(ot) document.getElementById('val_ot').value = ot[0];
            document.getElementById('ocr-status').innerText = "✅ Importé";
            sauvegarderAuto();
        } catch (e) { document.getElementById('ocr-status').innerText = "❌ Échec scan"; }
    }

    // --- GÉNÉRATION WORD ---
    async function genererWordFinal() {
        const { Document, Packer, Paragraph, TextRun, AlignmentType, Table, TableRow, TableCell, WidthType, ImageRun } = docx;
        const ot = document.getElementById('val_ot').value || "SANS_OT";
        const rsrp = parseInt(document.getElementById('val_rsrp').value);
        const type = document.getElementById('type_projet').value;
        const sigData = sigCanvas.toDataURL("image/png");
        const resS = await fetch(sigData); const blobS = await resS.blob();

        const content = [
            new Paragraph({ children: [new TextRun({ text: "SOGETREL", bold: true, color: "002d5b", size: 28 })], alignment: AlignmentType.RIGHT }),
            new Paragraph({ text: "", spacing: { after: 200 } }),
            new Paragraph({ children: [new TextRun({ text: "CIT REPORT IA - AUDIT INFO U", bold: true, size: 36, color: "002d5b" })], alignment: AlignmentType.CENTER }),
            new Paragraph({ text: "", spacing: { after: 400 } }),
            
            new Table({
                width: { size: 100, type: WidthType.PERCENTAGE },
                rows: [
                    new TableRow({ children: [
                        new TableCell({ children: [new Paragraph({ text: "NUMÉRO D’OT", bold: true })], shading: {fill:"f0f0f0"} }),
                        new TableCell({ children: [new Paragraph(ot)] })
                    ]}),
                    new TableRow({ children: [
                        new TableCell({ children: [new Paragraph({ text: "CHEF DE PROJET", bold: true })], shading: {fill:"f0f0f0"} }),
                        new TableCell({ children: [new Paragraph(document.getElementById('liste_cp').value)] })
                    ]}),
                    new TableRow({ children: [
                        new TableCell({ children: [new Paragraph({ text: "CLIENT", bold: true })], shading: {fill:"f0f0f0"} }),
                        new TableCell({ children: [new Paragraph(document.getElementById('val_client').value)] })
                    ]}),
                    new TableRow({ children: [
                        new TableCell({ children: [new Paragraph({ text: "ADRESSE", bold: true })], shading: {fill:"f0f0f0"} }),
                        new TableCell({ children: [new Paragraph(document.getElementById('val_adresse').value)] })
                    ]})
                ]
            }),

            new Paragraph({ text: "1. PRÉAMBULE", heading: docx.HeadingLevel.HEADING_1, spacing: {before: 600} }),
            new Paragraph("Audit réalisé dans le cadre de l'optimisation de connectivité INFO U."),
            
            new Paragraph({ text: "2. ANALYSE CRADLEPOINT", heading: docx.HeadingLevel.HEADING_1, spacing: {before: 400} })
        ];

        if (rsrp < -90) {
            content.push(new Paragraph({ text: "PRÉCONISATION : Pose antenne déportée nécessaire (Signal faible).", color: "FF0000", bold: true }));
        } else {
            content.push(new Paragraph({ text: "CONSTAT : Signal interne suffisant. Installation intérieure standard.", color: "27ae60", bold: true }));
        }

        if (type === "AERIEN_PARTAGE") {
            content.push(new Paragraph({ text: "3. PREREQUIS CLIENT (MAGASIN U)", heading: docx.HeadingLevel.HEADING_1, spacing: {before: 400} }));
            if(document.getElementById('pre_gaine').checked) content.push(new Paragraph("- Gaine 40mm à poser par le client."));
            if(document.getElementById('pre_percement').checked) content.push(new Paragraph("- Percement dalle client à réaliser."));
        }

        content.push(new Paragraph({ text: "SIGNATURE :", bold: true, spacing: {before: 600} }));
        content.push(new Paragraph("Technicien : " + document.getElementById('val_tech').value));
        content.push(new Paragraph({ children: [new ImageRun({ data: blobS, transformation: { width: 180, height: 70 } })] }));

        const doc = new Document({ sections: [{ children: content }] });
        Packer.toBlob(doc).then(b => saveAs(b, `CIT_REPORT_${ot}.docx`));
    }

    // --- SIGNATURE & STORAGE ---
    const sigCanvas = document.getElementById('signature-pad');
    const sigCtx = sigCanvas.getContext('2d');
    let signing = false;
    sigCanvas.width = sigCanvas.offsetWidth; sigCanvas.height = 130;
    sigCanvas.onmousedown = sigCanvas.ontouchstart = (e) => { signing = true; sigCtx.beginPath(); };
    window.onmouseup = window.ontouchend = () => signing = false;
    sigCanvas.onmousemove = sigCanvas.ontouchmove = (e) => {
        if(!signing) return;
        const r = sigCanvas.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
        sigCtx.lineTo(x, y); sigCtx.stroke();
    };
    function clearSig() { sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height); }

    function sauvegarderAuto() {
        const d = { ot: document.getElementById('val_ot').value, client: document.getElementById('val_client').value, tech: document.getElementById('val_tech').value };
        localStorage.setItem('brouillon_cit', JSON.stringify(d));
    }

    rafraichirCP();
    majLogiqueProjet();
</script>
</body>
</html>
