<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOGETREL EXPERT V33 - FULL PICO & MULTI-REPORTS</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.2/docxtemplater.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root { --blue: #002d5b; --orange: #f39c12; --green: #27ae60; --light: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 10px; padding-bottom: 160px; color: #333; }
        .header { background: var(--blue); color: white; padding: 15px; text-align: center; border-radius: 0 0 20px 20px; margin: -10px -10px 20px -10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border-top: 5px solid var(--blue); }
        h3 { margin: 0 0 10px 0; color: var(--blue); font-size: 0.9em; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        select, input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; margin-bottom: 8px; font-size: 14px; }
        .btn-add { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; cursor: pointer; font-weight: bold; }
        
        /* Photo Zones with Markers */
        .photo-item { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 10px; margin-bottom: 15px; position: relative; }
        .canvas-container { position: relative; width: 100%; background: #222; border-radius: 8px; overflow: hidden; margin-top: 10px; }
        canvas { width: 100%; height: auto; display: block; cursor: crosshair; }
        
        /* Pico Specific */
        .pico-data { background: #e3f2fd; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--blue); }
        
        /* Measurements */
        .pm-block { border-left: 5px solid var(--green); background: #f9fafb; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .pm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px; background: white; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 1000; }
        .btn-gen { background: var(--green); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; width: 100%; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h2>SOGETREL FIELD EXPERT V33</h2>
    <p>Pico, Starlink, Cradlepoint & Antenne</p>
</div>

<div class="card" style="border-top-color: var(--orange);">
    <h3>📂 Type de Mission</h3>
    <select id="active_tpl" onchange="toggleSections()">
        <optgroup label="PICO (Orange/Sfr)">
            <option value="AUDIT_PICO">Audit PICO</option>
            <option value="DOE_PICO">DOE PICO</option>
        </optgroup>
        <optgroup label="AUTRES MISSIONS">
            <option value="AUDIT_CRADLEPOINT">Audit Cradlepoint</option>
            <option value="DOE_CRADLEPOINT">DOE Cradlepoint</option>
            <option value="AUDIT_STARLINK">Audit Starlink</option>
            <option value="DOE_STARLINK">DOE Starlink</option>
            <option value="AUDIT_ANTENNE">Audit Antenne Déportée</option>
            <option value="DOE_ANTENNE">DOE Antenne Déportée</option>
        </optgroup>
    </select>
</div>

<div id="section_pico" class="card" style="display:none; border-top-color: var(--blue);">
    <h3>📡 Équipements PICO (IMEI / SN)</h3>
    <button class="btn-add" onclick="addPicoZone()">➕ Ajouter un Équipement Pico</button>
    <div id="pico_list"></div>
</div>

<div id="section_travaux" class="card">
    <h3>🛠️ Travaux & Prérequis</h3>
    <select id="work_type">
        <option value="SOGETREL">Travaux 100% SOGETREL</option>
        <option value="CLIENT">PRÉREQUIS CLIENT</option>
    </select>
    <textarea id="travaux_desc" placeholder="Observations ou prérequis..." rows="2"></textarea>
</div>

<div class="card">
    <h3>📍 Identification Site</h3>
    <input type="text" id="ot" placeholder="Numéro d'OT">
    <input type="text" id="client" placeholder="Client / Enseigne">
    <input type="text" id="tech" value="Emmanuel MAUDET">
</div>

<div class="card">
    <h3>🖼️ Plans & Photos Diverses</h3>
    <button class="btn-add" onclick="addPhotoZone('GÉNÉRALE')">➕ Ajouter Photo / Plan</button>
    <div id="zones_list"></div>
</div>

<div class="card">
    <h3>📉 Mesures Radio & Speedtest</h3>
    <div id="pm_container"></div>
</div>

<div class="footer">
    <button class="btn-gen" onclick="generateReport()">🚀 GÉNÉRER LE RAPPORT (.DOCX)</button>
</div>

<script>
    // COLLEZ VOS CODES BASE64 ICI
    const TEMPLATES = {
        AUDIT_PICO: "BASE64_ICI", DOE_PICO: "BASE64_ICI",
        AUDIT_CRADLEPOINT: "BASE64_ICI", DOE_CRADLEPOINT: "BASE64_ICI",
        AUDIT_STARLINK: "BASE64_ICI", DOE_STARLINK: "BASE64_ICI",
        AUDIT_ANTENNE: "BASE64_ICI", DOE_ANTENNE: "BASE64_ICI"
    };

    let allPhotos = []; // {id, type: 'PICO'|'GEN', img, markers: [], imei, sn}

    function toggleSections() {
        const val = document.getElementById('active_tpl').value;
        document.getElementById('section_pico').style.display = val.includes('PICO') ? 'block' : 'none';
    }

    function addPicoZone() {
        const id = Date.now();
        allPhotos.push({ id, type: 'PICO', img: null, markers: [], imei: '', sn: '' });
        renderPico();
    }

    function addPhotoZone() {
        const id = Date.now();
        allPhotos.push({ id, type: 'GEN', img: null, markers: [] });
        renderGen();
    }

    function renderPico() {
        const container = document.getElementById('pico_list');
        container.innerHTML = "";
        allPhotos.filter(p => p.type === 'PICO').forEach(p => {
            container.innerHTML += `
                <div class="photo-item">
                    <div class="pico-data">
                        <input type="text" placeholder="IMEI Pico" onchange="updatePicoData(${p.id}, 'imei', this.value)">
                        <input type="text" placeholder="S/N Pico" onchange="updatePicoData(${p.id}, 'sn', this.value)">
                    </div>
                    <input type="file" accept="image/*" onchange="loadImage(${p.id}, this)">
                    <div class="canvas-container"><canvas id="canvas_${p.id}" onclick="addMarker(${p.id}, event)"></canvas></div>
                </div>`;
        });
    }

    function renderGen() {
        const container = document.getElementById('zones_list');
        container.innerHTML = "";
        allPhotos.filter(p => p.type === 'GEN').forEach(p => {
            container.innerHTML += `
                <div class="photo-item">
                    <input type="file" accept="image/*" onchange="loadImage(${p.id}, this)">
                    <div class="canvas-container"><canvas id="canvas_${p.id}" onclick="addMarker(${p.id}, event)"></canvas></div>
                </div>`;
        });
    }

    function updatePicoData(id, field, val) { allPhotos.find(x => x.id === id)[field] = val; }

    function loadImage(id, input) {
        if (input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const p = allPhotos.find(x => x.id === id);
                    p.img = img;
                    const cvs = document.getElementById(`canvas_${id}`);
                    cvs.width = img.width; cvs.height = img.height;
                    draw(p);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function addMarker(id, e) {
        const p = allPhotos.find(x => x.id === id);
        if(!p.img) return;
        const cvs = document.getElementById(`canvas_${id}`);
        const rect = cvs.getBoundingClientRect();
        p.markers.push({ 
            x: (e.clientX - rect.left) * (cvs.width / rect.width), 
            y: (e.clientY - rect.top) * (cvs.height / rect.height),
            label: (getTotalMarkers() + 1) 
        });
        draw(p);
        updatePMTable();
    }

    function draw(p) {
        const ctx = document.getElementById(`canvas_${p.id}`).getContext('2d');
        ctx.drawImage(p.img, 0, 0);
        p.markers.forEach(m => {
            const r = ctx.canvas.width * 0.025;
            ctx.beginPath(); ctx.arc(m.x, m.y, r, 0, Math.PI*2);
            ctx.fillStyle = "#27ae60"; ctx.fill();
            ctx.fillStyle = "white"; ctx.font = `bold ${r}px Arial`; ctx.textAlign="center";
            ctx.fillText("M"+m.label, m.x, m.y + (r/3));
        });
    }

    function getTotalMarkers() { return allPhotos.reduce((a, b) => a + b.markers.length, 0); }

    function updatePMTable() {
        const container = document.getElementById('pm_container');
        const count = getTotalMarkers();
        container.innerHTML = "";
        for(let i=1; i<=count; i++) {
            container.innerHTML += `
                <div class="pm-block">
                    <b>POINT M${i}</b>
                    <div class="pm-grid">
                        <input type="number" id="rsrp_${i}" placeholder="RSRP">
                        <input type="number" id="dl_${i}" placeholder="Download">
                    </div>
                </div>`;
        }
    }

    async function generateReport() {
        const b64 = TEMPLATES[document.getElementById('active_tpl').value];
        if(b64 === "BASE64_ICI") return alert("Template manquant.");

        const zip = new PizZip(strToBuf(b64));
        const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

        const data = {
            ot: document.getElementById('ot').value,
            client: document.getElementById('client').value,
            tech: document.getElementById('tech').value,
            travaux_desc: document.getElementById('travaux_desc').value,
            is_sogetrel: document.getElementById('work_type').value === 'SOGETREL',
            is_client: document.getElementById('work_type').value === 'CLIENT',
            picos: allPhotos.filter(p => p.type === 'PICO').map(p => ({ imei: p.imei, sn: p.sn })),
            mesures: []
        };

        for(let i=1; i<=getTotalMarkers(); i++) {
            data.mesures.push({ num: "M"+i, rsrp: document.getElementById(`rsrp_${i}`).value, dl: document.getElementById(`dl_${i}`).value });
        }

        doc.render(data);
        saveAs(doc.getZip().generate({type:"blob"}), `SOGETREL_${data.ot}.docx`);
    }

    function strToBuf(b64) {
        const s = window.atob(b64); const b = new Uint8Array(s.length);
        for(let i=0; i<s.length; i++) b[i] = s.charCodeAt(i);
        return b;
    }

    toggleSections();
</script>
</body>
</html>
