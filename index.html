  <title>Generateur de Rapport — Bouygues</title>
  <style>
  :root {
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left:   env(safe-area-inset-left,   0px);
    --safe-right:  env(safe-area-inset-right,  0px);
    --tab-height:  calc(56px + env(safe-area-inset-bottom, 0px));
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #020817;
    width: 100%; overflow-x: hidden;
  }
  #root { min-height: 100dvh; width: 100%; }

  /* Espace en haut pour la barre de statut Android (heure, batterie...) */
  .audit-root {
    padding-top: max(env(safe-area-inset-top, 0px), 28px);
  }

  /* ── PORTRAIT : centré, max 430px ── */
  /* Bottom nav bar — au-dessus des contrôles système Android */
  .audit-tab-bar-fixed {
    position: fixed !important;
    bottom: 0 !important;
    top: auto !important;
    z-index: 1000;
    border-top: 2px solid #1e3a5f !important;
    border-bottom: none !important;
    /* Marge sous la barre : safe-area si dispo, sinon 52px (barre nav Samsung) */
    padding-bottom: max(env(safe-area-inset-bottom, 0px), 52px) !important;
  }

  @media (orientation: portrait) {
    .audit-root {
      max-width: 430px;
      margin: 0 auto;
      width: 100%;
    }
    .audit-tab-bar-fixed {
      max-width: 430px;
      left: 50%;
      transform: translateX(-50%);
    }
  }

  /* Contenu : espace en bas pour la barre carrousel */
  .audit-content-area {
    padding-bottom: calc(70px + env(safe-area-inset-bottom, 8px));
  }

  /* ── PAYSAGE : pleine largeur ── */
  @media (orientation: landscape) {
    .audit-root {
      max-width: 100% !important;
      width: 100% !important;
      margin: 0 !important;
    }
    /* Barre d'onglets en bas pleine largeur */
    .audit-tab-bar-fixed {
      max-width: 100% !important;
      left: 0 !important;
      right: 0 !important;
      transform: none !important;
    }
    /* Tableau PM s'étale */
    table { min-width: unset !important; width: 100%; }
    /* Grille rapports 2 colonnes */
    .audit-list-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    /* Contenu rapport: padding latéral */
    .audit-section-content {
      padding-left: 24px;
      padding-right: 24px;
    }
  }

  /* ── Scrollbar fine ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 4px; }
</style>

<script>
(function() {
  function applyBottomInset() {
    var inset = 0;
    // Method 1: CSS env() via a test element
    var test = document.createElement('div');
    test.style.cssText = 'position:fixed;bottom:env(safe-area-inset-bottom,0px);height:0;width:0;visibility:hidden;';
    document.body.appendChild(test);
    var envVal = parseInt(window.getComputedStyle(test).bottom) || 0;
    document.body.removeChild(test);
    
    // Method 2: visualViewport height difference
    if (window.visualViewport) {
      var diff = window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop;
      if (diff > 0) inset = Math.max(inset, diff);
    }
    
    // Method 3: window height vs screen height ratio
    var navBarH = window.screen.height - window.innerHeight;
    if (navBarH > 20 && navBarH < 200) inset = Math.max(inset, navBarH);
    
    // Use env() value if available, otherwise our calculation
    var final = Math.max(envVal, inset, 0);
    
    document.documentElement.style.setProperty('--safe-bottom', final + 'px');
    document.documentElement.style.setProperty('--tab-height', (56 + final) + 'px');
  }
  
  applyBottomInset();
  window.addEventListener('resize', applyBottomInset);
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', applyBottomInset);
  }
  // Re-apply after page load
  window.addEventListener('load', applyBottomInset);
  setTimeout(applyBottomInset, 500);
  setTimeout(applyBottomInset, 1500);
})();
</script>
