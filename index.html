<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOGETREL PRO - GÉNÉRATEUR MULTI-MODÈLES</title>
    
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --sogetrel-blue: #002d5b; --sogetrel-green: #27ae60; --sogetrel-orange: #f39c12; }
        body { 
            font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; padding: 10px; padding-bottom: 140px;
            user-select: none; -webkit-user-select: none;
        }
        .header { background: var(--sogetrel-blue); color: white; padding: 15px; text-align: center; border-radius: 0 0 20px 20px; margin: -10px -10px 20px -10px; position: relative; }
        .btn-resume { position: absolute; left: 10px; top: 15px; background: var(--sogetrel-orange); color: white; border: none; padding: 8px 12px; border-radius: 5px; font-size: 11px; cursor: pointer; font-weight: bold; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border-top: 5px solid var(--sogetrel-blue); }
        h3 { margin-top: 0; color: var(--sogetrel-blue); font-size: 1.1em; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 0.85em; color: #444; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-block { display: none; }
        .btn-gen { background: var(--sogetrel-green); color: white; border: none; padding: 16px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        #signature-pad { border: 2px dashed #bbb; height: 150px; background: #fff; width: 100%; border-radius: 8px; touch-action: none; }
        .footer-btns { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px; background: white; z-index: 1000; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 1px solid #ddd; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="header">
    <button class="btn-resume" onclick="chargerBrouillon()">📂 REPRENDRE</button>
    <h2 style="margin:0;">SOGETREL</h2>
    <p style="margin:5px 0 0; opacity:0.8; font-size: 11px;">Audit & DOE : PICO, Cradlepoint, Starlink</p>
</div>

<div class="card">
    <h3>📍 Informations Client & Contact</h3>
    <label>Type de Rapport</label>
    <select id="selectRapport" onchange="changerFormulaire(); sauvegarderAuto();">
        <option value="">-- Choisir un modèle --</option>
        <option value="AUDIT_PICO">🔍 Audit PICO</option>
        <option value="DOE_PICO">🏢 DOE PICO</option>
        <option value="AUDIT_CRADLEPOINT">🔍 Audit Cradlepoint</option>
        <option value="DOE_CRADLEPOINT">🏢 DOE Cradlepoint</option>
        <option value="ANTENNE_DEPORTEE">📡 Antenne Déportée</option>
        <option value="STARLINK">🛰️ Starlink</option>
    </select>
    
    <div class="grid">
        <input type="text" id="num_rapport" placeholder="N° OT" oninput="sauvegarderAuto()">
        <input type="text" id="client_nom" placeholder="Nom du Client" oninput="sauvegarderAuto()">
    </div>
    
    <label>Adresse & Contact sur site</label>
    <input type="text" id="ville_site" placeholder="Adresse complète du site" oninput="sauvegarderAuto()">
    <input type="text" id="contact_nom" placeholder="Nom du contact" oninput="sauvegarderAuto()">
    <div class="grid">
        <input type="tel" id="contact_tel" placeholder="Téléphone" oninput="sauvegarderAuto()">
        <input type="email" id="contact_mail" placeholder="Email" oninput="sauvegarderAuto()">
    </div>
</div>

<div id="bloc_audit" class="form-block card" style="border-top-color: #00bcd4;">
    <h3>🔍 Détails de l'Audit</h3>
    <textarea id="audit_existant" rows="2" placeholder="Analyse de l'existant / Environnement" oninput="sauvegarderAuto()"></textarea>
    <div class="grid">
        <select id="audit_nacelle" onchange="sauvegarderAuto()"><option>NACELLE : NON</option><option>NACELLE : OUI</option></select>
        <input type="number" id="audit_hauteur" placeholder="Hauteur (m)" oninput="sauvegarderAuto()">
    </div>
    <input type="text" id="audit_support" placeholder="Support préconisé (Mur, Poteau...)" style="margin-top:10px;" oninput="sauvegarderAuto()">
</div>

<div id="bloc_doe_cp" class="form-block card" style="border-top-color: #e67e22;">
    <h3>📊 Relevés Cradlepoint (4G/5G)</h3>
    <div class="grid">
        <input type="text" id="cp_modele" placeholder="Modèle (ex: E300, IBR900)" oninput="sauvegarderAuto()">
        <input type="text" id="cp_sn" placeholder="N° de Série (S/N)" oninput="sauvegarderAuto()">
    </div>
    <label>Mesures Signal</label>
    <div class="grid">
        <input type="text" id="cp_rsrp" placeholder="RSRP (dBm)" oninput="sauvegarderAuto()">
        <input type="text" id="cp_sinr" placeholder="SINR (dB)" oninput="sauvegarderAuto()">
    </div>
    <input type="text" id="cp_debit" placeholder="Débit constaté (D/U Mbps)" style="margin-top:10px;" oninput="sauvegarderAuto()">
</div>

<div id="bloc_doe_pico" class="form-block card" style="border-top-color: #2ecc71;">
    <h3>🏢 Détails Installation PICO</h3>
    <input type="text" id="p_emplacement" placeholder="Emplacement Baie Info" oninput="sauvegarderAuto()">
    <div class="grid" style="margin-top:10px;">
        <input type="text" id="p_sn_baie" placeholder="S/N Baie" oninput="sauvegarderAuto()">
        <input type="text" id="p_dbm" placeholder="Mesure Sortie Antenne" oninput="sauvegarderAuto()">
    </div>
</div>

<div class="card">
    <h3>✍️ Validation & Signature</h3>
    <input type="text" id="nom_signataire" placeholder="Nom du signataire" oninput="sauvegarderAuto()">
    <canvas id="signature-pad"></canvas>
    <button onclick="sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height)" style="width:100%; margin-top:5px; padding:5px; border:1px solid #ccc; background:#f9f9f9;">Effacer signature</button>
</div>

<div class="footer-btns">
    <button class="btn-gen" style="background:#007bff;" onclick="genererWordFinal()">GÉNÉRER WORD</button>
    <button class="btn-gen" onclick="window.print()">IMPRIMER PDF</button>
</div>

<script>
    /** SAUVEGARDE AUTOMATIQUE **/
    function sauvegarderAuto() {
        const fields = ["selectRapport","num_rapport","client_nom","ville_site","contact_nom","contact_tel","contact_mail","audit_existant","audit_nacelle","audit_hauteur","audit_support","cp_modele","cp_sn","cp_rsrp","cp_sinr","cp_debit","p_emplacement","p_sn_baie","p_dbm","nom_signataire"];
        const data = {};
        fields.forEach(id => data[id] = document.getElementById(id).value);
        localStorage.setItem("brouillon_sogetrel_v2", JSON.stringify(data));
    }

    function chargerBrouillon() {
        const data = JSON.parse(localStorage.getItem("brouillon_sogetrel_v2"));
        if (!data) return alert("Aucun brouillon trouvé.");
        Object.keys(data).forEach(key => { if(document.getElementById(key)) document.getElementById(key).value = data[key]; });
        changerFormulaire();
        alert("Brouillon récupéré !");
    }

    /** INTERFACE DYNAMIQUE **/
    function changerFormulaire() {
        const val = document.getElementById("selectRapport").value;
        // Reset blocks
        document.getElementById("bloc_audit").style.display = (val.includes("AUDIT")) ? "block" : "none";
        document.getElementById("bloc_doe_pico").style.display = (val === "DOE_PICO") ? "block" : "none";
        document.getElementById("bloc_doe_cp").style.display = (val === "DOE_CRADLEPOINT") ? "block" : "none";
    }

    // Signature
    const sigCanvas = document.getElementById('signature-pad');
    const sigCtx = sigCanvas.getContext('2d');
    let signing = false;
    sigCanvas.width = sigCanvas.offsetWidth; sigCanvas.height = 150;
    const getPos = (e) => {
        const r = sigCanvas.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: cx - r.left, y: cy - r.top };
    };
    sigCanvas.onmousedown = sigCanvas.ontouchstart = (e) => { if(e.touches) e.preventDefault(); signing = true; sigCtx.beginPath(); };
    window.onmouseup = window.ontouchend = () => signing = false;
    sigCanvas.onmousemove = sigCanvas.ontouchmove = (e) => {
        if(!signing) return;
        const p = getPos(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke();
    };

    /** GÉNÉRATION WORD STYLE SOGETREL **/
    async function genererWordFinal() {
        const { Document, Packer, Paragraph, TextRun, ImageRun, AlignmentType, Table, TableRow, TableCell, WidthType } = docx;
        
        const ot = document.getElementById("num_rapport").value || "SANS-OT";
        const sigData = sigCanvas.toDataURL("image/png");
        const resS = await fetch(sigData); const blobS = await resS.blob();

        const doc = new Document({
            sections: [{
                properties: { page: { margin: { top: 720, right: 720, bottom: 720, left: 720 } } },
                children: [
                    new Paragraph({ children: [new TextRun({ text: "SOGETREL", bold: true, color: "002d5b", size: 28 })], alignment: AlignmentType.RIGHT }),
                    new Paragraph({ text: "", spacing: { after: 300 } }),
                    new Paragraph({ children: [new TextRun({ text: document.getElementById("selectRapport").value.replace(/_/g, ' '), bold: true, size: 36, color: "002d5b" })], alignment: AlignmentType.CENTER }),
                    new Paragraph({ text: "", spacing: { after: 400 } }),
                    
                    new Table({
                        width: { size: 100, type: WidthType.PERCENTAGE },
                        rows: [
                            new TableRow({ children: [
                                new TableCell({ children: [new Paragraph({ text: "SITE / CLIENT", bold: true })], shading: {fill:"f0f0f0"} }),
                                new TableCell({ children: [new Paragraph(`${document.getElementById("client_nom").value} \n ${document.getElementById("ville_site").value}`)] })
                            ]}),
                            new TableRow({ children: [
                                new TableCell({ children: [new Paragraph({ text: "CONTACT", bold: true })], shading: {fill:"f0f0f0"} }),
                                new TableCell({ children: [new Paragraph(`${document.getElementById("contact_nom").value} (${document.getElementById("contact_tel").value})`)] })
                            ]}),
                            new TableRow({ children: [
                                new TableCell({ children: [new Paragraph({ text: "DOSSIER OT", bold: true })], shading: {fill:"f0f0f0"} }),
                                new TableCell({ children: [new Paragraph(ot)] })
                            ]})
                        ]
                    }),

                    new Paragraph({ text: "SIGNATURE :", bold: true, spacing: { before: 800 } }),
                    new Paragraph({ text: "Validé par : " + document.getElementById("nom_signataire").value }),
                    new Paragraph({ children: [new ImageRun({ data: blobS, transformation: { width: 180, height: 70 } })] })
                ]
            }]
        });
        Packer.toBlob(doc).then(b => saveAs(b, `RAPPORT_${ot}.docx`));
    }

    document.onkeydown = (e) => { if(e.keyCode == 123) return false; };
</script>

</body>
</html>
